services:
  - type: web
    name: ai-deal-scanner-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: src/scanner
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
    autoDeploy: true

  - type: cron
    name: ai-deal-scanner-cron
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: src/scanner
    buildCommand: npm install
    startCommand: npm run cron
    schedule: "0 */6 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
